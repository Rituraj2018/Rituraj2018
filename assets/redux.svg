<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="100%" height="100%">
  <!-- Defs for premium effects -->
  <defs>
    <!-- Background blur filter for glowing blobs -->
    <filter id="bgBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22" />
    </filter>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Soft neon glow for text -->
    <filter id="textGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Canvas Radial Background -->
    <radialGradient id="canvasBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#100b1a" />
      <stop offset="100%" stop-color="#030205" />
    </radialGradient>

    <!-- Glassmorphic Card Background -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0917" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#050308" stop-opacity="0.95" />
    </linearGradient>

    <!-- Rotating Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%" gradientTransform="rotate(0 0.5 0.5)">
      <animateTransform 
        attributeName="gradientTransform" 
        type="rotate" 
        from="0 0.5 0.5" 
        to="360 0.5 0.5" 
        dur="6s" 
        repeatCount="indefinite"/>
      <stop offset="0%" stop-color="#764abc"/>
      <stop offset="35%" stop-color="#9c27b0"/>
      <stop offset="70%" stop-color="#512da8"/>
      <stop offset="100%" stop-color="#764abc"/>
    </linearGradient>

    <!-- Shiny diagonal line gradient -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Glossy reflection static gradient -->
    <linearGradient id="reflectionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Logo Gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0" />
      <stop offset="100%" stop-color="#764abc" />
    </linearGradient>

    <!-- Logo Glow -->
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#764abc" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#764abc" stop-opacity="0"/>
    </radialGradient>

    <!-- Mask for card inner boundaries -->
    <mask id="cardMask">
      <rect x="10" y="10" width="160" height="160" rx="20" fill="#ffffff" />
    </mask>
  </defs>

  <!-- 1. Canvas Background -->
  <rect width="180" height="180" rx="22" fill="url(#canvasBg)" />

  <!-- 2. Ambient Background Glow Blobs -->
  <circle cx="35" cy="35" r="55" fill="#764abc" opacity="0.12" filter="url(#bgBlur)">
    <animate attributeName="opacity" values="0.08;0.16;0.08" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="145" cy="145" r="55" fill="#9c27b0" opacity="0.1" filter="url(#bgBlur)">
    <animate attributeName="opacity" values="0.14;0.07;0.14" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- 3. Floating Container for the Entire Card -->
  <g>
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      values="0 0; 0 -4; 0 0" 
      keyTimes="0; 0.5; 1"
      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
      calcMode="spline"
      dur="6s" 
      repeatCount="indefinite" />

    <!-- Card Base (Shadow + Glassmorphic background + Glowing Animated Border) -->
    <rect x="10" y="10" width="160" height="160" rx="20" 
          fill="url(#cardBg)" 
          stroke="url(#borderGrad)" 
          stroke-width="1.25" 
          filter="url(#cardShadow)" />

    <!-- Card Masked Elements (Grid, HUD, Shine, Particles) -->
    <g mask="url(#cardMask)">
      <!-- Soft Cyber Grid -->
      <path d="M 10 30 H 170 M 10 50 H 170 M 10 70 H 170 M 10 90 H 170 M 10 110 H 170 M 10 130 H 170 M 10 150 H 170 M 30 10 V 170 M 50 10 V 170 M 70 10 V 170 M 90 10 V 170 M 110 10 V 170 M 130 10 V 170 M 150 10 V 170" 
            stroke="#ffffff" stroke-width="0.5" opacity="0.04" />
      
      <!-- Tech HUD Circles Behind Logo -->
      <circle cx="90" cy="75" r="48" fill="none" stroke="#764abc" stroke-width="0.5" opacity="0.08" stroke-dasharray="3 6"/>
      
      <!-- Rotating Outer HUD circle -->
      <g transform="translate(90, 75)">
        <circle cx="0" cy="0" r="58" fill="none" stroke="#9c27b0" stroke-width="0.5" opacity="0.06" stroke-dasharray="10 5">
          <animateTransform 
            attributeName="transform" 
            type="rotate" 
            from="0" 
            to="360" 
            dur="12s" 
            repeatCount="indefinite" />
        </circle>
      </g>

      <!-- Glowing Particles inside Card -->
      <g opacity="0.7">
        <circle cx="35" cy="45" r="1" fill="#764abc">
          <animate attributeName="opacity" values="0.1;0.9;0.1" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="145" cy="40" r="0.8" fill="#9c27b0">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="40" cy="120" r="1.2" fill="#512da8">
          <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="140" cy="125" r="1" fill="#764abc">
          <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="125" cy="50" r="0.8" fill="#9c27b0">
          <animate attributeName="opacity" values="0.1;0.7;0.1" dur="4.2s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- Radial Glow Core behind Logo -->
      <circle cx="90" cy="75" r="32" fill="url(#logoGlow)" />

      <!-- Wobbling & Breathing Logo Group -->
      <g transform="translate(90, 75)">
        <g>
          <animateTransform 
            attributeName="transform" 
            type="scale" 
            values="1; 1.05; 1" 
            keyTimes="0; 0.5; 1"
            keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
            calcMode="spline"
            dur="4s" 
            repeatCount="indefinite" />
          <animateTransform 
            attributeName="transform" 
            type="rotate" 
            values="-3; 3; -3" 
            keyTimes="0; 0.5; 1"
            keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
            calcMode="spline"
            dur="5.5s" 
            repeatCount="indefinite" 
            additive="sum" />

          <!-- Official Redux Logo Path scaled to fit -->
          <g transform="scale(1.8) translate(-12, -12)">
            <path fill="url(#logoGrad)" d="M16.634 16.504c.87-.075 1.543-.84 1.5-1.754-.047-.914-.796-1.648-1.709-1.648h-.061a1.71 1.71 0 00-1.648 1.769c.03.479.226.869.494 1.153-1.048 2.038-2.621 3.536-5.005 4.795-1.603.838-3.296 1.154-4.944.93-1.378-.195-2.456-.81-3.116-1.799-.988-1.499-1.078-3.116-.255-4.734.6-1.17 1.499-2.023 2.099-2.443a9.96 9.96 0 01-.42-1.543C-.868 14.408-.416 18.752.932 20.805c1.004 1.498 3.057 2.456 5.304 2.456.6 0 1.23-.044 1.843-.194 3.897-.749 6.848-3.086 8.541-6.532zm5.348-3.746c-2.32-2.728-5.738-4.226-9.634-4.226h-.51c-.253-.554-.837-.899-1.498-.899h-.045c-.943 0-1.678.81-1.647 1.753.03.898.794 1.648 1.708 1.648h.074a1.69 1.69 0 001.499-1.049h.555c2.309 0 4.495.674 6.488 1.992 1.527 1.005 2.622 2.323 3.237 3.897.538 1.288.509 2.547-.045 3.597-.855 1.647-2.294 2.517-4.196 2.517-1.199 0-2.367-.375-2.967-.644-.36.298-.96.793-1.394 1.093 1.318.598 2.652.943 3.94.943 2.922 0 5.094-1.647 5.919-3.236.898-1.798.824-4.824-1.47-7.416zM6.49 17.042c.03.899.793 1.648 1.708 1.648h.06a1.688 1.688 0 001.648-1.768c0-.9-.779-1.647-1.693-1.647h-.06c-.06 0-.15 0-.226.029-1.243-2.098-1.768-4.347-1.572-6.772.12-1.828.72-3.417 1.797-4.735.9-1.124 2.593-1.68 3.747-1.708 3.236-.061 4.585 3.971 4.689 5.574l1.498.45C17.741 3.197 14.686.62 11.764.62 9.02.62 6.49 2.613 5.47 5.535 4.077 9.43 4.991 13.177 6.7 16.174c-.15.195-.24.539-.21.868z"/>
          </g>
        </g>
      </g>

      <!-- Glass Static Reflection overlay -->
      <path d="M 10 10 L 170 10 L 170 75 L 10 110 Z" fill="url(#reflectionGrad)" opacity="0.08"/>

      <!-- Animated Glass Shine Sweep -->
      <rect x="-150" y="-50" width="50" height="300" fill="url(#shineGrad)" transform="rotate(30)">
        <animate attributeName="x" values="-220; 260" dur="5s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Card Text -->
    <!-- Glow Backing Text -->
    <text x="90" y="142" 
          font-family="'Inter', 'Poppins', 'Segoe UI', sans-serif" 
          font-size="12" 
          font-weight="600" 
          fill="#764abc" 
          text-anchor="middle" 
          letter-spacing="1.5"
          filter="url(#textGlow)"
          opacity="0.8">REDUX</text>
    <!-- Crisp Foreground Text -->
    <text x="90" y="142" 
          font-family="'Inter', 'Poppins', 'Segoe UI', sans-serif" 
          font-size="12" 
          font-weight="600" 
          fill="#ffffff" 
          text-anchor="middle" 
          letter-spacing="1.5">REDUX</text>
  </g>
</svg>
