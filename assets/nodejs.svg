<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="100%" height="100%">
  <!-- Defs for premium effects -->
  <defs>
    <!-- Background blur filter for glowing blobs -->
    <filter id="bgBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24" />
    </filter>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.65"/>
    </filter>

    <!-- Soft neon glow for text -->
    <filter id="textGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Canvas Radial Background -->
    <radialGradient id="canvasBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#060c22" />
      <stop offset="100%" stop-color="#020309" />
    </radialGradient>

    <!-- Glassmorphic Card Background -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c122b" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#040716" stop-opacity="0.95" />
    </linearGradient>

    <!-- Rotating Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%" gradientTransform="rotate(0 0.5 0.5)">
      <animateTransform 
        attributeName="gradientTransform" 
        type="rotate" 
        from="0 0.5 0.5" 
        to="360 0.5 0.5" 
        dur="5s" 
        repeatCount="indefinite"/>
      <stop offset="0%" stop-color="#3ECF8E"/>
      <stop offset="35%" stop-color="#00FFB3"/>
      <stop offset="70%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#3ECF8E"/>
    </linearGradient>

    <!-- Shiny diagonal line gradient -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Glossy reflection static gradient -->
    <linearGradient id="reflectionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Logo Gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3ECF8E" />
      <stop offset="100%" stop-color="#22C55E" />
    </linearGradient>

    <!-- Logo Glow -->
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8AFFC1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8AFFC1" stop-opacity="0"/>
    </radialGradient>

    <!-- Mask for card inner boundaries -->
    <mask id="cardMask">
      <rect x="15" y="15" width="190" height="190" rx="22" fill="#ffffff" />
    </mask>
  </defs>

  <!-- 1. Canvas Background -->
  <rect width="220" height="220" rx="24" fill="url(#canvasBg)" />

  <!-- 2. Ambient Background Glow Blobs -->
  <circle cx="50" cy="50" r="70" fill="#00FFB3" opacity="0.12" filter="url(#bgBlur)">
    <animate attributeName="opacity" values="0.08;0.18;0.08" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="170" r="70" fill="#3ECF8E" opacity="0.1" filter="url(#bgBlur)">
    <animate attributeName="opacity" values="0.18;0.08;0.18" dur="9s" repeatCount="indefinite"/>
  </circle>

  <!-- 3. Floating Container for the Entire Card -->
  <g>
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      values="0 0; 0 -5; 0 0" 
      keyTimes="0; 0.5; 1"
      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
      calcMode="spline"
      dur="7s" 
      repeatCount="indefinite" />

    <!-- Card Base (Shadow + Glassmorphic background + Glowing Animated Border) -->
    <rect x="15" y="15" width="190" height="190" rx="22" 
          fill="url(#cardBg)" 
          stroke="url(#borderGrad)" 
          stroke-width="1.5" 
          filter="url(#cardShadow)" />

    <!-- Card Masked Elements (Grid, HUD, Shine, Particles, Neural Network) -->
    <g mask="url(#cardMask)">
      <!-- Soft Cyber Grid -->
      <path d="M 15 40 H 205 M 15 65 H 205 M 15 90 H 205 M 15 115 H 205 M 15 140 H 205 M 15 165 H 205 M 15 190 H 205 M 40 15 V 205 M 65 15 V 205 M 90 15 V 205 M 115 15 V 205 M 140 15 V 205 M 165 15 V 205 M 190 15 V 205" 
            stroke="#ffffff" stroke-width="0.5" opacity="0.04" />

      <!-- Neural Network Lines / Cyber HUD -->
      <g stroke="#00FFB3" stroke-width="0.5" opacity="0.12" fill="none">
        <line x1="50" y1="60" x2="80" y2="40" />
        <line x1="80" y1="40" x2="140" y2="40" />
        <line x1="140" y1="40" x2="170" y2="70" />
        <line x1="170" y1="70" x2="150" y2="120" />
        <line x1="150" y1="120" x2="70" y2="130" />
        <line x1="70" y1="130" x2="50" y2="60" />
        <!-- dots -->
        <circle cx="50" cy="60" r="1.5" fill="#00FFB3"/>
        <circle cx="80" cy="40" r="1.5" fill="#3ECF8E"/>
        <circle cx="140" cy="40" r="1.5" fill="#00FFB3"/>
        <circle cx="170" cy="70" r="1.5" fill="#3ECF8E"/>
        <circle cx="150" cy="120" r="1.5" fill="#00FFB3"/>
        <circle cx="70" cy="130" r="1.5" fill="#3ECF8E"/>
      </g>
      
      <!-- Tech HUD Circles Behind Logo -->
      <circle cx="110" cy="95" r="54" fill="none" stroke="#3ECF8E" stroke-width="0.5" opacity="0.08" stroke-dasharray="3 6"/>
      
      <!-- Rotating Outer HUD circle (Orbital Particles / Moving Neon Ring) -->
      <g transform="translate(110, 95)">
        <circle cx="0" cy="0" r="42" fill="none" stroke="#8AFFC1" stroke-width="0.75" opacity="0.1" stroke-dasharray="8 4">
          <animateTransform 
            attributeName="transform" 
            type="rotate" 
            from="0" 
            to="360" 
            dur="12s" 
            repeatCount="indefinite" />
        </circle>
        <circle cx="0" cy="0" r="50" fill="none" stroke="#00FFB3" stroke-width="0.5" opacity="0.08" stroke-dasharray="24 8">
          <animateTransform 
            attributeName="transform" 
            type="rotate" 
            from="360" 
            to="0" 
            dur="9s" 
            repeatCount="indefinite" />
        </circle>
      </g>

      <!-- Glowing Particles inside Card -->
      <g opacity="0.7">
        <circle cx="45" cy="55" r="1.2" fill="#00FFB3">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="175" cy="45" r="1" fill="#3ECF8E">
          <animate attributeName="opacity" values="0.1;0.9;0.1" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="50" cy="140" r="1.5" fill="#8AFFC1">
          <animate attributeName="opacity" values="0.3;0.8;0.3" dur="7s" repeatCount="indefinite"/>
        </circle>
        <circle cx="170" cy="145" r="1.2" fill="#00FFB3">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="5s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- Radial Glow Core behind Logo -->
      <circle cx="110" cy="95" r="36" fill="url(#logoGlow)" />

      <!-- Wobbling, Breathing & Floating Node.js Logo Group -->
      <g transform="translate(110, 95)">
        <g>
          <animateTransform 
            attributeName="transform" 
            type="scale" 
            values="1; 1.06; 1" 
            keyTimes="0; 0.5; 1"
            keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
            calcMode="spline"
            dur="5s" 
            repeatCount="indefinite" />
          <animateTransform 
            attributeName="transform" 
            type="rotate" 
            values="-4; 4; -4" 
            keyTimes="0; 0.5; 1"
            keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
            calcMode="spline"
            dur="7s" 
            repeatCount="indefinite" 
            additive="sum" />

          <!-- Official Node.js Logo Path scaled to fit -->
          <g transform="scale(2.2) translate(-12, -12)">
            <!-- Outer Hexagon -->
            <path fill="url(#logoGrad)" d="M11.998,24c-0.321,0-0.641-0.084-0.922-0.247l-2.936-1.737c-0.438-0.245-0.224-0.332-0.08-0.383 c0.585-0.203,0.703-0.25,1.328-0.604c0.065-0.037,0.151-0.023,0.218,0.017l2.256,1.339c0.082,0.045,0.197,0.045,0.272,0 l8.795-5.076 c0.082-0.047,0.134-0.141,0.134-0.238V6.921c0-0.099-0.053-0.192-0.137-0.242l-8.791-5.072c-0.081-0.047-0.189-0.047-0.271,0 L3.075,6.68C2.99,6.729,2.936,6.825,2.936,6.921v10.15c0,0.097,0.054,0.189,0.139,0.235l2.409,1.392 c1.307,0.654,2.108-0.116,2.108-0.89V7.787c0-0.142,0.114-0.253,0.256-0.253h1.115c0.139,0,0.255,0.112,0.255,0.253v10.021 c0,1.745-0.95,2.745-2.604,2.745c-0.508,0-0.909,0-2.026-0.551L2.28,18.675c-0.57-0.329-0.922-0.945-0.922-1.604V6.921 c0-0.659,0.353-1.275,0.922-1.603l8.795-5.082c0.557-0.315,1.296-0.315,1.848,0l8.794,5.082c0.57,0.329,0.924,0.944,0.924,1.603 v10.15c0,0.659-0.354,1.273-0.924,1.604l-8.794,5.078C12.643,23.916,12.324,24,11.998,24z"/>
            <!-- Inner Letters -->
            <path fill="#ffffff" d="M19.099,13.993 c0-1.9-1.284-2.406-3.987-2.763c-2.731-0.361-3.009-0.548-3.009-1.187c0-0.528,0.235-1.233,2.258-1.233 c1.807,0,2.473,0.389,2.747,1.607c0.024,0.115,0.129,0.199,0.247,0.199h1.141c0.071,0,0.138-0.031,0.186-0.081 c0.048-0.054,0.074-0.123,0.067-0.196c-0.177-2.098-1.571-3.076-4.388-3.076c-2.508,0-4.004,1.058-4.004,2.833 c0,1.925,1.488,2.457,3.895,2.695c2.88,0.282,3.103,0.703,3.103,1.269c0,0.983-0.789,1.402-2.642,1.402 c-2.327,0-2.839-0.584-3.011-1.742c-0.02-0.124-0.126-0.215-0.253-0.215h-1.137c-0.141,0-0.254,0.112-0.254,0.253 c0,1.482,0.806,3.248,4.655,3.248C17.501,17.007,19.099,15.91,19.099,13.993z"/>
          </g>
        </g>
      </g>

      <!-- Glass Static Reflection overlay -->
      <path d="M 15 15 L 205 15 L 205 90 L 15 130 Z" fill="url(#reflectionGrad)" opacity="0.08"/>

      <!-- Animated Glass Shine Sweep -->
      <rect x="-170" y="-50" width="55" height="350" fill="url(#shineGrad)" transform="rotate(30)">
        <animate attributeName="x" values="-240; 300" dur="5s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Card Text -->
    <!-- Glow Backing Text -->
    <text x="110" y="172" 
          font-family="'Inter', 'Poppins', 'Segoe UI', sans-serif" 
          font-size="14" 
          font-weight="700" 
          fill="#8AFFC1" 
          text-anchor="middle" 
          letter-spacing="1"
          filter="url(#textGlow)"
          opacity="0.8">Node.js</text>
    <!-- Crisp Foreground Text -->
    <text x="110" y="172" 
          font-family="'Inter', 'Poppins', 'Segoe UI', sans-serif" 
          font-size="14" 
          font-weight="700" 
          fill="#ffffff" 
          text-anchor="middle" 
          letter-spacing="1">Node.js</text>
  </g>
</svg>
