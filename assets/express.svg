<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="100%" height="100%">
  <!-- Defs for premium effects -->
  <defs>
    <!-- Background blur filter for glowing blobs -->
    <filter id="bgBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24" />
    </filter>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.65"/>
    </filter>

    <!-- Soft neon glow for text -->
    <filter id="textGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Canvas Radial Background -->
    <radialGradient id="canvasBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#050b1a" />
      <stop offset="100%" stop-color="#020309" />
    </radialGradient>

    <!-- Glassmorphic Card Background -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081026" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#030514" stop-opacity="0.95" />
    </linearGradient>

    <!-- Rotating Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%" gradientTransform="rotate(0 0.5 0.5)">
      <animateTransform 
        attributeName="gradientTransform" 
        type="rotate" 
        from="0 0.5 0.5" 
        to="360 0.5 0.5" 
        dur="5.8s" 
        repeatCount="indefinite"/>
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="35%" stop-color="#00FFB3"/>
      <stop offset="70%" stop-color="#0066ff"/>
      <stop offset="100%" stop-color="#00d2ff"/>
    </linearGradient>

    <!-- Shiny diagonal line gradient -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Glossy reflection static gradient -->
    <linearGradient id="reflectionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Logo Gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#d0d2d6" />
      <stop offset="100%" stop-color="#808285" />
    </linearGradient>

    <!-- Logo Glow -->
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8be4ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8be4ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Mask for card inner boundaries -->
    <mask id="cardMask">
      <rect x="15" y="15" width="190" height="190" rx="22" fill="#ffffff" />
    </mask>
  </defs>

  <!-- 1. Canvas Background -->
  <rect width="220" height="220" rx="24" fill="url(#canvasBg)" />

  <!-- 2. Ambient Background Glow Blobs -->
  <circle cx="50" cy="50" r="70" fill="#00d2ff" opacity="0.12" filter="url(#bgBlur)">
    <animate attributeName="opacity" values="0.08;0.18;0.08" dur="8.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="170" r="70" fill="#0066ff" opacity="0.1" filter="url(#bgBlur)">
    <animate attributeName="opacity" values="0.18;0.08;0.18" dur="8.8s" repeatCount="indefinite"/>
  </circle>

  <!-- 3. Floating Container for the Entire Card -->
  <g>
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      values="0 0; 0 -5; 0 0" 
      keyTimes="0; 0.5; 1"
      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
      calcMode="spline"
      dur="6.4s" 
      repeatCount="indefinite" />

    <!-- Card Base (Shadow + Glassmorphic background + Glowing Animated Border) -->
    <rect x="15" y="15" width="190" height="190" rx="22" 
          fill="url(#cardBg)" 
          stroke="url(#borderGrad)" 
          stroke-width="1.5" 
          filter="url(#cardShadow)" />

    <!-- Card Masked Elements (Grid, HUD, Shine, Particles, Neural Network) -->
    <g mask="url(#cardMask)">
      <!-- Soft Cyber Grid -->
      <path d="M 15 40 H 205 M 15 65 H 205 M 15 90 H 205 M 15 115 H 205 M 15 140 H 205 M 15 165 H 205 M 15 190 H 205 M 40 15 V 205 M 65 15 V 205 M 90 15 V 205 M 115 15 V 205 M 140 15 V 205 M 165 15 V 205 M 190 15 V 205" 
            stroke="#ffffff" stroke-width="0.5" opacity="0.04" />

      <!-- Neural Network Lines / Cyber HUD -->
      <g stroke="#00FFB3" stroke-width="0.5" opacity="0.12" fill="none">
        <line x1="50" y1="60" x2="80" y2="40" />
        <line x1="80" y1="40" x2="140" y2="40" />
        <line x1="140" y1="40" x2="170" y2="70" />
        <line x1="170" y1="70" x2="150" y2="120" />
        <line x1="150" y1="120" x2="70" y2="130" />
        <line x1="70" y1="130" x2="50" y2="60" />
        <!-- dots -->
        <circle cx="50" cy="60" r="1.5" fill="#00FFB3"/>
        <circle cx="80" cy="40" r="1.5" fill="#00d2ff"/>
        <circle cx="140" cy="40" r="1.5" fill="#00FFB3"/>
        <circle cx="170" cy="70" r="1.5" fill="#0066ff"/>
        <circle cx="150" cy="120" r="1.5" fill="#00FFB3"/>
        <circle cx="70" cy="130" r="1.5" fill="#00d2ff"/>
      </g>
      
      <!-- Tech HUD Circles Behind Logo -->
      <circle cx="110" cy="95" r="54" fill="none" stroke="#00d2ff" stroke-width="0.5" opacity="0.08" stroke-dasharray="3 6"/>
      
      <!-- Rotating Outer HUD circle (Orbital Particles / Moving Neon Ring) -->
      <g transform="translate(110, 95)">
        <circle cx="0" cy="0" r="42" fill="none" stroke="#8be4ff" stroke-width="0.75" opacity="0.1" stroke-dasharray="8 4">
          <animateTransform 
            attributeName="transform" 
            type="rotate" 
            from="0" 
            to="360" 
            dur="13.5s" 
            repeatCount="indefinite" />
        </circle>
        <circle cx="0" cy="0" r="50" fill="none" stroke="#00FFB3" stroke-width="0.5" opacity="0.08" stroke-dasharray="24 8">
          <animateTransform 
            attributeName="transform" 
            type="rotate" 
            from="360" 
            to="0" 
            dur="9s" 
            repeatCount="indefinite" />
        </circle>
      </g>

      <!-- Glowing Particles inside Card -->
      <g opacity="0.7">
        <circle cx="45" cy="55" r="1.2" fill="#00FFB3">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="175" cy="45" r="1" fill="#00d2ff">
          <animate attributeName="opacity" values="0.1;0.9;0.1" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="50" cy="140" r="1.5" fill="#8be4ff">
          <animate attributeName="opacity" values="0.3;0.8;0.3" dur="7s" repeatCount="indefinite"/>
        </circle>
        <circle cx="170" cy="145" r="1.2" fill="#00FFB3">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="5s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- Radial Glow Core behind Logo -->
      <circle cx="110" cy="95" r="36" fill="url(#logoGlow)" />

      <!-- Wobbling, Breathing & Floating Express Logo Group -->
      <g transform="translate(110, 95)">
        <g>
          <animateTransform 
            attributeName="transform" 
            type="scale" 
            values="1; 1.06; 1" 
            keyTimes="0; 0.5; 1"
            keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
            calcMode="spline"
            dur="4.8s" 
            repeatCount="indefinite" />
          <animateTransform 
            attributeName="transform" 
            type="rotate" 
            values="-4; 4; -4" 
            keyTimes="0; 0.5; 1"
            keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
            calcMode="spline"
            dur="6.8s" 
            repeatCount="indefinite" 
            additive="sum" />

          <!-- Official Express Logo Path scaled to fit -->
          <g transform="scale(2.2) translate(-12, -12)">
            <path fill="url(#logoGrad)" d="M24 18.588a1.529 1.529 0 01-1.895-.72l-3.45-4.771-.5-.667-4.003 5.444a1.466 1.466 0 01-1.802.708l5.158-6.92-4.798-6.251a1.595 1.595 0 011.9.666l3.576 4.83 3.596-4.81a1.435 1.435 0 011.788-.668L21.708 7.9l-2.522 3.283a.666.666 0 000 .994l4.804 6.412zM.002 11.576l.42-2.075c1.154-4.103 5.858-5.81 9.094-3.27 1.895 1.489 2.368 3.597 2.275 5.973H1.116C.943 16.447 4.005 19.009 7.92 17.7a4.078 4.078 0 002.582-2.876c.207-.666.548-.78 1.174-.588a5.417 5.417 0 01-2.589 3.957 6.272 6.272 0 01-7.306-.933 6.575 6.575 0 01-1.64-3.858c0-.235-.08-.455-.134-.666A88.33 88.33 0 010 11.577zm1.127-.286h9.654c-.06-3.076-2.001-5.258-4.59-5.278-2.882-.04-4.944 2.094-5.071 5.264z"/>
          </g>
        </g>
      </g>

      <!-- Glass Static Reflection overlay -->
      <path d="M 15 15 L 205 15 L 205 90 L 15 130 Z" fill="url(#reflectionGrad)" opacity="0.08"/>

      <!-- Animated Glass Shine Sweep -->
      <rect x="-170" y="-50" width="55" height="350" fill="url(#shineGrad)" transform="rotate(30)">
        <animate attributeName="x" values="-240; 300" dur="5.4s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Card Text -->
    <!-- Glow Backing Text -->
    <text x="110" y="172" 
          font-family="'Inter', 'Poppins', 'Segoe UI', sans-serif" 
          font-size="14" 
          font-weight="700" 
          fill="#00d2ff" 
          text-anchor="middle" 
          letter-spacing="1"
          filter="url(#textGlow)"
          opacity="0.8">Express.js</text>
    <!-- Crisp Foreground Text -->
    <text x="110" y="172" 
          font-family="'Inter', 'Poppins', 'Segoe UI', sans-serif" 
          font-size="14" 
          font-weight="700" 
          fill="#ffffff" 
          text-anchor="middle" 
          letter-spacing="1">Express.js</text>
  </g>
</svg>
