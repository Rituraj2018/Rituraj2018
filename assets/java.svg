<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="100%" height="100%">
  <!-- Defs for premium effects -->
  <defs>
    <!-- Background blur filter for glowing blobs -->
    <filter id="bgBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22" />
    </filter>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Soft neon glow for text -->
    <filter id="textGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Canvas Radial Background -->
    <radialGradient id="canvasBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#160805" />
      <stop offset="100%" stop-color="#030100" />
    </radialGradient>

    <!-- Glassmorphic Card Background -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#180d09" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#0a0402" stop-opacity="0.95" />
    </linearGradient>

    <!-- Rotating Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%" gradientTransform="rotate(0 0.5 0.5)">
      <animateTransform 
        attributeName="gradientTransform" 
        type="rotate" 
        from="0 0.5 0.5" 
        to="360 0.5 0.5" 
        dur="6s" 
        repeatCount="indefinite"/>
      <stop offset="0%" stop-color="#ff3b30"/>
      <stop offset="35%" stop-color="#007acc"/>
      <stop offset="70%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ff3b30"/>
    </linearGradient>

    <!-- Shiny diagonal line gradient -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Glossy reflection static gradient -->
    <linearGradient id="reflectionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Logo Gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="40%" stop-color="#007acc" />
      <stop offset="70%" stop-color="#ff3b30" />
      <stop offset="100%" stop-color="#ff5b00" />
    </linearGradient>

    <!-- Logo Glow -->
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3b30" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff3b30" stop-opacity="0"/>
    </radialGradient>

    <!-- Mask for card inner boundaries -->
    <mask id="cardMask">
      <rect x="10" y="10" width="160" height="160" rx="20" fill="#ffffff" />
    </mask>
  </defs>

  <!-- 1. Canvas Background -->
  <rect width="180" height="180" rx="22" fill="url(#canvasBg)" />

  <!-- 2. Ambient Background Glow Blobs -->
  <circle cx="35" cy="35" r="55" fill="#ff3b30" opacity="0.12" filter="url(#bgBlur)">
    <animate attributeName="opacity" values="0.08;0.16;0.08" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="145" cy="145" r="55" fill="#007acc" opacity="0.12" filter="url(#bgBlur)">
    <animate attributeName="opacity" values="0.16;0.08;0.16" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- 3. Floating Container for the Entire Card -->
  <g>
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      values="0 0; 0 -4; 0 0" 
      keyTimes="0; 0.5; 1"
      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
      calcMode="spline"
      dur="6s" 
      repeatCount="indefinite" />

    <!-- Card Base (Shadow + Glassmorphic background + Glowing Animated Border) -->
    <rect x="10" y="10" width="160" height="160" rx="20" 
          fill="url(#cardBg)" 
          stroke="url(#borderGrad)" 
          stroke-width="1.25" 
          filter="url(#cardShadow)" />

    <!-- Card Masked Elements (Grid, HUD, Shine, Particles) -->
    <g mask="url(#cardMask)">
      <!-- Soft Cyber Grid -->
      <path d="M 10 30 H 170 M 10 50 H 170 M 10 70 H 170 M 10 90 H 170 M 10 110 H 170 M 10 130 H 170 M 10 150 H 170 M 30 10 V 170 M 50 10 V 170 M 70 10 V 170 M 90 10 V 170 M 110 10 V 170 M 130 10 V 170 M 150 10 V 170" 
            stroke="#ffffff" stroke-width="0.5" opacity="0.04" />
      
      <!-- Tech HUD Circles Behind Logo -->
      <circle cx="90" cy="75" r="48" fill="none" stroke="#ff3b30" stroke-width="0.5" opacity="0.08" stroke-dasharray="3 6"/>
      
      <!-- Rotating Outer HUD circle -->
      <g transform="translate(90, 75)">
        <circle cx="0" cy="0" r="58" fill="none" stroke="#007acc" stroke-width="0.5" opacity="0.06" stroke-dasharray="10 5">
          <animateTransform 
            attributeName="transform" 
            type="rotate" 
            from="0" 
            to="360" 
            dur="13s" 
            repeatCount="indefinite" />
        </circle>
      </g>

      <!-- Glowing Particles inside Card -->
      <g opacity="0.7">
        <circle cx="35" cy="45" r="1" fill="#ff3b30">
          <animate attributeName="opacity" values="0.1;0.9;0.1" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="145" cy="40" r="0.8" fill="#007acc">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="40" cy="120" r="1.2" fill="#ffaa00">
          <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="140" cy="125" r="1" fill="#ff3b30">
          <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="125" cy="50" r="0.8" fill="#007acc">
          <animate attributeName="opacity" values="0.1;0.7;0.1" dur="4.2s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- Radial Glow Core behind Logo -->
      <circle cx="90" cy="75" r="32" fill="url(#logoGlow)" />

      <!-- Wobbling & Breathing Java Logo Group -->
      <g transform="translate(90, 75)">
        <g>
          <animateTransform 
            attributeName="transform" 
            type="scale" 
            values="1; 1.05; 1" 
            keyTimes="0; 0.5; 1"
            keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
            calcMode="spline"
            dur="4s" 
            repeatCount="indefinite" />
          <animateTransform 
            attributeName="transform" 
            type="rotate" 
            values="-3; 3; -3" 
            keyTimes="0; 0.5; 1"
            keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
            calcMode="spline"
            dur="5.5s" 
            repeatCount="indefinite" 
            additive="sum" />

          <!-- Official Java Logo Path scaled to fit -->
          <g transform="scale(1.8) translate(-12, -12)">
            <path fill="url(#logoGrad)" d="M8.851 18.56s-.917.534.653.714c1.902.218 2.874.187 4.969-.211 0 0 .552.346 1.321.646-4.699 2.013-10.633-.118-6.943-1.149M8.276 15.933s-1.028.761.542.924c2.032.209 3.636.227 6.413-.308 0 0 .384.389.987.602-5.679 1.661-12.007.13-7.942-1.218M13.116 11.475c1.158 1.333-.304 2.533-.304 2.533s2.939-1.518 1.589-3.418c-1.261-1.772-2.228-2.652 3.007-5.688 0-.001-8.216 2.051-4.292 6.573M19.33 20.504s.679.559-.747.991c-2.712.822-11.288 1.069-13.669.033-.856-.373.75-.89 1.254-.998.527-.114.828-.093.828-.093-.953-.671-6.156 1.317-2.643 1.887 9.58 1.553 17.462-.7 14.977-1.82M9.292 13.21s-4.362 1.036-1.544 1.412c1.189.159 3.561.123 5.77-.062 1.806-.152 3.618-.477 3.618-.477s-.637.272-1.098.587c-4.429 1.165-12.986.623-10.522-.568 2.082-1.006 3.776-.892 3.776-.892M17.116 17.584c4.503-2.34 2.421-4.589.968-4.285-.355.074-.515.138-.515.138s.132-.207.385-.297c2.875-1.011 5.086 2.981-.928 4.562 0-.001.07-.062.09-.118M14.401 0s2.494 2.494-2.365 6.33c-3.896 3.077-.888 4.832-.001 6.836-2.274-2.053-3.943-3.858-2.824-5.539 1.644-2.469 6.197-3.665 5.19-7.627M9.734 23.924c4.322.277 10.959-.153 11.116-2.198 0 0-.302.775-3.572 1.391-3.688.694-8.239.613-10.937.168 0-.001.553.457 3.393.639"/>
          </g>
        </g>
      </g>

      <!-- Glass Static Reflection overlay -->
      <path d="M 10 10 L 170 10 L 170 75 L 10 110 Z" fill="url(#reflectionGrad)" opacity="0.08"/>

      <!-- Animated Glass Shine Sweep -->
      <rect x="-150" y="-50" width="50" height="300" fill="url(#shineGrad)" transform="rotate(30)">
        <animate attributeName="x" values="-220; 260" dur="5s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Card Text -->
    <!-- Glow Backing Text -->
    <text x="90" y="142" 
          font-family="'Inter', 'Poppins', 'Segoe UI', sans-serif" 
          font-size="12" 
          font-weight="600" 
          fill="#ff3b30" 
          text-anchor="middle" 
          letter-spacing="3.5"
          filter="url(#textGlow)"
          opacity="0.8">JAVA</text>
    <!-- Crisp Foreground Text -->
    <text x="90" y="142" 
          font-family="'Inter', 'Poppins', 'Segoe UI', sans-serif" 
          font-size="12" 
          font-weight="600" 
          fill="#ffffff" 
          text-anchor="middle" 
          letter-spacing="3.5">JAVA</text>
  </g>
</svg>
