<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="100%" height="100%">
  <!-- Defs for premium effects -->
  <defs>
    <!-- Background blur filter for glowing blobs -->
    <filter id="bgBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22" />
    </filter>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Soft neon glow for text -->
    <filter id="textGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Canvas Radial Background -->
    <radialGradient id="canvasBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0d1d" />
      <stop offset="100%" stop-color="#020306" />
    </radialGradient>

    <!-- Glassmorphic Card Background -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080b1a" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#03040a" stop-opacity="0.95" />
    </linearGradient>

    <!-- Rotating Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%" gradientTransform="rotate(0 0.5 0.5)">
      <animateTransform 
        attributeName="gradientTransform" 
        type="rotate" 
        from="0 0.5 0.5" 
        to="360 0.5 0.5" 
        dur="6s" 
        repeatCount="indefinite"/>
      <stop offset="0%" stop-color="#3448c5"/>
      <stop offset="35%" stop-color="#0072c6"/>
      <stop offset="70%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#3448c5"/>
    </linearGradient>

    <!-- Shiny diagonal line gradient -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Glossy reflection static gradient -->
    <linearGradient id="reflectionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Logo Gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0072c6" />
      <stop offset="100%" stop-color="#3448c5" />
    </linearGradient>

    <!-- Logo Glow -->
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3448c5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3448c5" stop-opacity="0"/>
    </radialGradient>

    <!-- Mask for card inner boundaries -->
    <mask id="cardMask">
      <rect x="10" y="10" width="160" height="160" rx="20" fill="#ffffff" />
    </mask>
  </defs>

  <!-- 1. Canvas Background -->
  <rect width="180" height="180" rx="22" fill="url(#canvasBg)" />

  <!-- 2. Ambient Background Glow Blobs -->
  <circle cx="35" cy="35" r="55" fill="#3448c5" opacity="0.12" filter="url(#bgBlur)">
    <animate attributeName="opacity" values="0.08;0.16;0.08" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="145" cy="145" r="55" fill="#0072c6" opacity="0.1" filter="url(#bgBlur)">
    <animate attributeName="opacity" values="0.14;0.07;0.14" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- 3. Floating Container for the Entire Card -->
  <g>
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      values="0 0; 0 -4; 0 0" 
      keyTimes="0; 0.5; 1"
      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
      calcMode="spline"
      dur="6s" 
      repeatCount="indefinite" />

    <!-- Card Base (Shadow + Glassmorphic background + Glowing Animated Border) -->
    <rect x="10" y="10" width="160" height="160" rx="20" 
          fill="url(#cardBg)" 
          stroke="url(#borderGrad)" 
          stroke-width="1.25" 
          filter="url(#cardShadow)" />

    <!-- Card Masked Elements (Grid, HUD, Shine, Particles) -->
    <g mask="url(#cardMask)">
      <!-- Soft Cyber Grid -->
      <path d="M 10 30 H 170 M 10 50 H 170 M 10 70 H 170 M 10 90 H 170 M 10 110 H 170 M 10 130 H 170 M 10 150 H 170 M 30 10 V 170 M 50 10 V 170 M 70 10 V 170 M 90 10 V 170 M 110 10 V 170 M 130 10 V 170 M 150 10 V 170" 
            stroke="#ffffff" stroke-width="0.5" opacity="0.04" />
      
      <!-- Tech HUD Circles Behind Logo -->
      <circle cx="90" cy="75" r="48" fill="none" stroke="#3448c5" stroke-width="0.5" opacity="0.08" stroke-dasharray="3 6"/>
      
      <!-- Rotating Outer HUD circle -->
      <g transform="translate(90, 75)">
        <circle cx="0" cy="0" r="58" fill="none" stroke="#0072c6" stroke-width="0.5" opacity="0.06" stroke-dasharray="10 5">
          <animateTransform 
            attributeName="transform" 
            type="rotate" 
            from="0" 
            to="360" 
            dur="12s" 
            repeatCount="indefinite" />
        </circle>
      </g>

      <!-- Glowing Particles inside Card -->
      <g opacity="0.7">
        <circle cx="35" cy="45" r="1" fill="#3448c5">
          <animate attributeName="opacity" values="0.1;0.9;0.1" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="145" cy="40" r="0.8" fill="#0072c6">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="40" cy="120" r="1.2" fill="#4f46e5">
          <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="140" cy="125" r="1" fill="#3448c5">
          <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="125" cy="50" r="0.8" fill="#0072c6">
          <animate attributeName="opacity" values="0.1;0.7;0.1" dur="4.2s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- Radial Glow Core behind Logo -->
      <circle cx="90" cy="75" r="32" fill="url(#logoGlow)" />

      <!-- Wobbling & Breathing Logo Group -->
      <g transform="translate(90, 75)">
        <g>
          <animateTransform 
            attributeName="transform" 
            type="scale" 
            values="1; 1.05; 1" 
            keyTimes="0; 0.5; 1"
            keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
            calcMode="spline"
            dur="4s" 
            repeatCount="indefinite" />
          <animateTransform 
            attributeName="transform" 
            type="rotate" 
            values="-3; 3; -3" 
            keyTimes="0; 0.5; 1"
            keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
            calcMode="spline"
            dur="5.5s" 
            repeatCount="indefinite" 
            additive="sum" />

          <!-- Official Cloudinary Logo Path scaled to fit -->
          <g transform="scale(1.8) translate(-12, -12)">
            <path fill="url(#logoGrad)" d="M24 14.8598c0 2.1729-1.3757 3.974-3.5903 4.6996l-.0995.0318V17.989c1.3777-.5805 2.1869-1.7275 2.1869-3.1291-.0072-2-1.6087-3.6288-3.6082-3.6699h-.5964l-.1432-.5686c-.7025-2.8996-3.2886-4.9489-6.2721-4.97a6.3915 6.3915 0 0 0-5.811 3.664l-.1828.3757-.4175.0437a4.4311 4.4311 0 0 0-3.3052 2.088c-1.2803 2.0856-.6274 4.8143 1.4583 6.0947v1.6897h-.01l-.149-.0675a5.9402 5.9402 0 0 1-3.3658-4.3494c-.5787-3.2291 1.57-6.3161 4.7991-6.8948a7.8766 7.8766 0 0 1 6.9839-4.149c3.4724.025 6.535 2.28 7.5901 5.5883 2.5789.3366 4.5138 2.5245 4.5327 5.1251zm-15.3176-1.322h.5647a.0656.0656 0 0 0 .0457-.1113L7.084 11.2158l-.0007-.0007a.0656.0656 0 0 0-.0927.0007L4.78 13.4265a.0656.0656 0 0 0 .0477.1113h.5566a.0656.0656 0 0 1 .0657.0656v5.0574c0 .6588.534 1.1928 1.1928 1.1928H9.247a.0656.0656 0 0 0 .0457-.1113l-.33-.33a1.1928 1.1928 0 0 1-.348-.839v-4.97a.0676.0676 0 0 1 .0676-.0655zm9.769 2.5466h.5667a.0655.0655 0 0 0 .0457-.1133l-2.2107-2.2087-.0015-.0015a.0636.0636 0 0 0-.0899.0015L14.551 15.971a.0657.0657 0 0 0 .0457.1133h.5567a.0656.0656 0 0 1 .0656.0656v2.5108c0 .6588.534 1.1928 1.1928 1.1928h2.6063a.0655.0655 0 0 0 .0457-.1113l-.33-.33a1.1928 1.1928 0 0 1-.348-.839V16.15a.0656.0656 0 0 1 .0657-.0656zm-4.8844-1.2743h.5646a.0656.0656 0 0 0 .0477-.1114l-2.2107-2.2027-.0006-.0006a.0656.0656 0 0 0-.0928.0006l-2.2087 2.2068a.0656.0656 0 0 0 .0457.1113h.5626a.0676.0676 0 0 1 .0657.0676v3.7791c0 .6588.534 1.1928 1.1928 1.1928h2.5983a.0656.0656 0 0 0 .0477-.1113l-.332-.33a1.193 1.193 0 0 1-.346-.839v-3.6956c0-.0366.0291-.0665.0657-.0676z"/>
          </g>
        </g>
      </g>

      <!-- Glass Static Reflection overlay -->
      <path d="M 10 10 L 170 10 L 170 75 L 10 110 Z" fill="url(#reflectionGrad)" opacity="0.08"/>

      <!-- Animated Glass Shine Sweep -->
      <rect x="-150" y="-50" width="50" height="300" fill="url(#shineGrad)" transform="rotate(30)">
        <animate attributeName="x" values="-220; 260" dur="5s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Card Text -->
    <!-- Glow Backing Text -->
    <text x="90" y="142" 
          font-family="'Inter', 'Poppins', 'Segoe UI', sans-serif" 
          font-size="12" 
          font-weight="600" 
          fill="#3448c5" 
          text-anchor="middle" 
          letter-spacing="1.5"
          filter="url(#textGlow)"
          opacity="0.8">CLOUDINARY</text>
    <!-- Crisp Foreground Text -->
    <text x="90" y="142" 
          font-family="'Inter', 'Poppins', 'Segoe UI', sans-serif" 
          font-size="11" 
          font-weight="600" 
          fill="#ffffff" 
          text-anchor="middle" 
          letter-spacing="1">CLOUDINARY</text>
  </g>
</svg>
