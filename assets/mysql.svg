<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="100%" height="100%">
  <defs>
    <!-- Ambient blur for background blobs -->
    <filter id="bgBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>

    <!-- Premium card drop shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.65"/>
    </filter>

    <!-- Double-layer neon text glow -->
    <filter id="textGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="1.2" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Logo neon glow filter -->
    <filter id="logoGlowFilter" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Deep indigo background -->
    <radialGradient id="canvasBg" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#050b18"/>
      <stop offset="100%" stop-color="#010307"/>
    </radialGradient>

    <!-- Glass card interior -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1220" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#030812" stop-opacity="0.96"/>
    </linearGradient>

    <!-- Animated rotating border — MySQL blues & oranges -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%" gradientTransform="rotate(0 0.5 0.5)">
      <animateTransform attributeName="gradientTransform" type="rotate"
        from="0 0.5 0.5" to="360 0.5 0.5" dur="6s" repeatCount="indefinite"/>
      <stop offset="0%"   stop-color="#00adef"/>
      <stop offset="30%"  stop-color="#f77c00"/>
      <stop offset="65%"  stop-color="#4479a1"/>
      <stop offset="100%" stop-color="#00adef"/>
    </linearGradient>

    <!-- Glass shine sweep -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#fff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>

    <!-- Top reflection -->
    <linearGradient id="reflGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>

    <!-- MySQL blue-to-orange logo gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00adef"/>
      <stop offset="55%"  stop-color="#4479a1"/>
      <stop offset="100%" stop-color="#f77c00"/>
    </linearGradient>

    <!-- Radial glow behind logo -->
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00adef" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00adef" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip to card interior -->
    <mask id="cardMask">
      <rect x="15" y="15" width="190" height="190" rx="22" fill="#fff"/>
    </mask>
  </defs>

  <!-- ═══ Canvas Background ═══ -->
  <rect width="220" height="220" rx="24" fill="url(#canvasBg)"/>

  <!-- ═══ Ambient Glow Blobs ═══ -->
  <circle cx="45" cy="45" r="72" fill="#00adef" opacity="0.13" filter="url(#bgBlur)">
    <animate attributeName="opacity" values="0.08;0.18;0.08" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="178" cy="175" r="68" fill="#f77c00" opacity="0.11" filter="url(#bgBlur)">
    <animate attributeName="opacity" values="0.17;0.07;0.17" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="175" cy="45" r="45" fill="#4479a1" opacity="0.1" filter="url(#bgBlur)">
    <animate attributeName="opacity" values="0.05;0.15;0.05" dur="11s" repeatCount="indefinite"/>
  </circle>

  <!-- ═══ Floating Card Container ═══ -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0 0;0 -5;0 0" keyTimes="0;0.5;1"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1" calcMode="spline"
      dur="7s" repeatCount="indefinite"/>

    <!-- Glass Card Body -->
    <rect x="15" y="15" width="190" height="190" rx="22"
          fill="url(#cardBg)" stroke="url(#borderGrad)" stroke-width="1.6"
          filter="url(#cardShadow)"/>

    <!-- ── Masked Interior ── -->
    <g mask="url(#cardMask)">

      <!-- Subtle cyber grid -->
      <path d="M15 40H205 M15 65H205 M15 90H205 M15 115H205 M15 140H205 M15 165H205 M15 190H205
               M40 15V205 M65 15V205 M90 15V205 M115 15V205 M140 15V205 M165 15V205 M190 15V205"
            stroke="#fff" stroke-width="0.4" opacity="0.04"/>

      <!-- Neural network accent lines -->
      <g stroke="#00adef" stroke-width="0.5" opacity="0.13" fill="none">
        <line x1="48" y1="58" x2="82" y2="38"/>
        <line x1="82" y1="38" x2="138" y2="38"/>
        <line x1="138" y1="38" x2="172" y2="68"/>
        <line x1="172" y1="68" x2="152" y2="122"/>
        <line x1="152" y1="122" x2="68" y2="132"/>
        <line x1="68"  y1="132" x2="48" y2="58"/>
        <circle cx="48"  cy="58"  r="1.8" fill="#00adef"/>
        <circle cx="82"  cy="38"  r="1.8" fill="#f77c00"/>
        <circle cx="138" cy="38"  r="1.8" fill="#00adef"/>
        <circle cx="172" cy="68"  r="1.8" fill="#4479a1"/>
        <circle cx="152" cy="122" r="1.8" fill="#f77c00"/>
        <circle cx="68"  cy="132" r="1.8" fill="#00adef"/>
      </g>

      <!-- HUD ring (static dashed) -->
      <circle cx="110" cy="92" r="55" fill="none" stroke="#4479a1"
              stroke-width="0.5" opacity="0.09" stroke-dasharray="4 7"/>

      <!-- Orbital ring 1 — CW -->
      <g transform="translate(110,92)">
        <circle cx="0" cy="0" r="43" fill="none" stroke="#00adef"
                stroke-width="0.8" opacity="0.12" stroke-dasharray="9 5">
          <animateTransform attributeName="transform" type="rotate"
            from="0" to="360" dur="12s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- Orbital ring 2 — CCW -->
      <g transform="translate(110,92)">
        <circle cx="0" cy="0" r="52" fill="none" stroke="#f77c00"
                stroke-width="0.5" opacity="0.08" stroke-dasharray="20 8">
          <animateTransform attributeName="transform" type="rotate"
            from="360" to="0" dur="9s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- Floating neon particles -->
      <circle cx="42"  cy="52"  r="1.3" fill="#00adef" opacity="0.7">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="178" cy="44"  r="1.0" fill="#f77c00" opacity="0.7">
        <animate attributeName="opacity" values="0.1;0.9;0.1" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="48"  cy="142" r="1.5" fill="#4479a1" opacity="0.7">
        <animate attributeName="opacity" values="0.3;0.85;0.3" dur="7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="172" cy="147" r="1.2" fill="#00adef" opacity="0.7">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="155" cy="52"  r="0.9" fill="#f77c00" opacity="0.7">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="62"  cy="48"  r="0.9" fill="#4479a1" opacity="0.7">
        <animate attributeName="opacity" values="0.1;0.8;0.1" dur="6s" repeatCount="indefinite"/>
      </circle>

      <!-- Radial glow halo -->
      <circle cx="110" cy="92" r="38" fill="url(#logoGlow)"/>

      <!-- ── Logo Group: scale-breathe + gentle sway ── -->
      <g transform="translate(110,92)">
        <!-- Breathing scale -->
        <g>
          <animateTransform attributeName="transform" type="scale"
            values="1;1.055;1" keyTimes="0;0.5;1"
            keySplines="0.42 0 0.58 1;0.42 0 0.58 1" calcMode="spline"
            dur="5s" repeatCount="indefinite"/>
          <!-- Gentle sway -->
          <animateTransform attributeName="transform" type="rotate"
            values="-4;4;-4" keyTimes="0;0.5;1"
            keySplines="0.42 0 0.58 1;0.42 0 0.58 1" calcMode="spline"
            dur="8s" repeatCount="indefinite" additive="sum"/>

          <!-- Official MySQL path — scale(2.15) centred on 12,12 -->
          <g transform="scale(2.15) translate(-12,-12)" filter="url(#logoGlowFilter)">
            <path fill="url(#logoGrad)" d="M16.405 5.501c-.115 0-.193.014-.274.033v.013h.014c.054.104.146.18.214.273.054.107.1.214.154.32l.014-.015c.094-.066.14-.172.14-.333-.04-.047-.046-.094-.08-.14-.04-.067-.126-.1-.18-.153zM5.77 18.695h-.927a50.854 50.854 0 00-.27-4.41h-.008l-1.41 4.41H2.45l-1.4-4.41h-.01a72.892 72.892 0 00-.195 4.41H0c.055-1.966.192-3.81.41-5.53h1.15l1.335 4.064h.008l1.347-4.064h1.095c.242 2.015.384 3.86.428 5.53zm4.017-4.08c-.378 2.045-.876 3.533-1.492 4.46-.482.716-1.01 1.073-1.583 1.073-.153 0-.34-.046-.566-.138v-.494c.11.017.24.026.386.026.268 0 .483-.075.647-.222.197-.18.295-.382.295-.605 0-.155-.077-.47-.23-.944L6.23 14.615h.91l.727 2.36c.164.536.233.91.205 1.123.4-1.064.678-2.227.835-3.483zm12.325 4.08h-2.63v-5.53h.885v4.85h1.745zm-3.32.135l-1.016-.5c.09-.076.177-.158.255-.25.433-.506.648-1.258.648-2.253 0-1.83-.718-2.746-2.155-2.746-.704 0-1.254.232-1.65.697-.43.508-.646 1.256-.646 2.245 0 .972.19 1.686.574 2.14.35.41.877.615 1.583.615.264 0 .506-.033.725-.098l1.325.772.36-.622zM15.5 17.588c-.225-.36-.337-.94-.337-1.736 0-1.393.424-2.09 1.27-2.09.443 0 .77.167.977.5.224.362.336.936.336 1.723 0 1.404-.424 2.108-1.27 2.108-.445 0-.77-.167-.978-.5zm-1.658-.425c0 .47-.172.856-.516 1.156-.344.3-.803.45-1.384.45-.543 0-1.064-.172-1.573-.515l.237-.476c.438.22.833.328 1.19.328.332 0 .593-.073.783-.22a.754.754 0 00.3-.615c0-.33-.23-.61-.648-.845-.388-.213-1.163-.657-1.163-.657-.422-.307-.632-.636-.632-1.177 0-.45.157-.81.47-1.085.315-.278.72-.415 1.22-.415.512 0 .98.136 1.4.41l-.213.476a2.726 2.726 0 00-1.064-.23c-.283 0-.502.068-.654.206a.685.685 0 00-.248.524c0 .328.234.61.666.85.393.215 1.187.67 1.187.67.433.305.648.63.648 1.168zm9.382-5.852c-.535-.014-.95.04-1.297.188-.1.04-.26.04-.274.167.055.053.063.14.11.214.08.134.218.313.346.407.14.11.28.216.427.31.26.16.555.255.81.416.145.094.293.213.44.313.073.05.12.14.214.172v-.02c-.046-.06-.06-.147-.105-.214-.067-.067-.134-.127-.2-.193a3.223 3.223 0 00-.695-.675c-.214-.146-.682-.35-.77-.595l-.013-.014c.146-.013.32-.066.46-.106.227-.06.435-.047.67-.106.106-.027.213-.06.32-.094v-.06c-.12-.12-.21-.283-.334-.395a8.867 8.867 0 00-1.104-.823c-.21-.134-.476-.22-.697-.334-.08-.04-.214-.06-.26-.127-.12-.146-.19-.34-.275-.514a17.69 17.69 0 01-.547-1.163c-.12-.262-.193-.523-.34-.763-.69-1.137-1.437-1.826-2.586-2.5-.247-.14-.543-.2-.856-.274-.167-.008-.334-.02-.5-.027-.11-.047-.216-.174-.31-.235-.38-.24-1.364-.76-1.644-.072-.18.434.267.862.422 1.082.115.153.26.328.34.5.047.116.06.235.107.356.106.294.207.622.347.897.073.14.153.287.247.413.054.073.146.107.167.227-.094.136-.1.334-.154.5-.24.757-.146 1.693.194 2.25.107.166.362.534.703.393.3-.12.234-.5.32-.835.02-.08.007-.133.048-.187v.015c.094.188.188.367.274.555.206.328.566.668.867.895.16.12.287.328.487.402v-.02h-.015c-.043-.058-.1-.086-.154-.133a3.445 3.445 0 01-.35-.4 8.76 8.76 0 01-.747-1.218c-.11-.21-.202-.436-.29-.643-.04-.08-.04-.2-.107-.24-.1.146-.247.273-.32.453-.127.288-.14.642-.188 1.01-.027.007-.014 0-.027.014-.214-.052-.287-.274-.367-.46-.2-.475-.233-1.238-.06-1.785.047-.14.247-.582.167-.716-.042-.127-.174-.2-.247-.303a2.478 2.478 0 01-.24-.427c-.16-.374-.24-.788-.414-1.162-.08-.173-.22-.354-.334-.513-.127-.18-.267-.307-.368-.52-.033-.073-.08-.194-.027-.274.014-.054.042-.075.094-.09.088-.072.335.022.422.062.247.1.455.194.662.334.094.066.195.193.315.226h.14c.214.047.455.014.655.073.355.114.675.28.962.46a5.953 5.953 0 012.085 2.286c.08.154.115.295.188.455.14.33.313.663.455.982.14.315.275.636.476.897.1.14.502.213.682.286.133.06.34.115.46.188.23.14.454.3.67.454.11.076.443.243.463.378z"/>
          </g>
        </g>
      </g>

      <!-- Glass top reflection -->
      <path d="M15 15 L205 15 L205 88 L15 128 Z" fill="url(#reflGrad)" opacity="0.07"/>

      <!-- Animated glass shine sweep -->
      <rect x="-180" y="-55" width="58" height="360" fill="url(#shineGrad)" transform="rotate(30)">
        <animate attributeName="x" values="-250;310" dur="5s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- ── Card Text ── -->
    <!-- Neon glow layer -->
    <text x="110" y="174"
          font-family="'Inter','Poppins','Segoe UI',sans-serif"
          font-size="15" font-weight="700"
          fill="#00adef" text-anchor="middle" letter-spacing="1.5"
          filter="url(#textGlow)" opacity="0.75">MySQL</text>
    <!-- Crisp white foreground -->
    <text x="110" y="174"
          font-family="'Inter','Poppins','Segoe UI',sans-serif"
          font-size="15" font-weight="700"
          fill="#ffffff" text-anchor="middle" letter-spacing="1.5">MySQL</text>
  </g>
</svg>
