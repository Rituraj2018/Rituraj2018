<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="100%" height="100%">
  <!-- Defs for premium effects -->
  <defs>
    <!-- Background blur filter for glowing blobs -->
    <filter id="bgBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24" />
    </filter>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.65"/>
    </filter>

    <!-- Soft neon glow for text -->
    <filter id="textGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Canvas Radial Background -->
    <radialGradient id="canvasBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0b0614" />
      <stop offset="100%" stop-color="#030206" />
    </radialGradient>

    <!-- Glassmorphic Card Background -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10081e" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#04020a" stop-opacity="0.95" />
    </linearGradient>

    <!-- Rotating Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%" gradientTransform="rotate(0 0.5 0.5)">
      <animateTransform 
        attributeName="gradientTransform" 
        type="rotate" 
        from="0 0.5 0.5" 
        to="360 0.5 0.5" 
        dur="9s" 
        repeatCount="indefinite"/>
      <stop offset="0%" stop-color="#00ffd2"/>
      <stop offset="35%" stop-color="#a855f7"/>
      <stop offset="70%" stop-color="#0066ff"/>
      <stop offset="100%" stop-color="#00ffd2"/>
    </linearGradient>

    <!-- Shiny diagonal line gradient -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Glossy reflection static gradient -->
    <linearGradient id="reflectionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Logo Gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="60%" stop-color="#e0e2e5" />
      <stop offset="100%" stop-color="#9095a0" />
    </linearGradient>

    <!-- Logo Glow -->
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffd2" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00ffd2" stop-opacity="0"/>
    </radialGradient>

    <!-- Mask for card inner boundaries -->
    <mask id="cardMask">
      <rect x="15" y="15" width="190" height="190" rx="22" fill="#ffffff" />
    </mask>
  </defs>

  <!-- 1. Canvas Background -->
  <rect width="220" height="220" rx="24" fill="url(#canvasBg)" />

  <!-- 2. Ambient Background Glow Blobs -->
  <circle cx="50" cy="50" r="70" fill="#00ffd2" opacity="0.12" filter="url(#bgBlur)">
    <animate attributeName="opacity" values="0.08;0.18;0.08" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="170" r="70" fill="#a855f7" opacity="0.12" filter="url(#bgBlur)">
    <animate attributeName="opacity" values="0.18;0.08;0.18" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- 3. Floating Container for the Entire Card -->
  <g>
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      values="0 0; 0 -5; 0 0" 
      keyTimes="0; 0.5; 1"
      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
      calcMode="spline"
      dur="5s" 
      repeatCount="indefinite" />

    <!-- Card Base (Shadow + Glassmorphic background + Glowing Animated Border) -->
    <rect x="15" y="15" width="190" height="190" rx="22" 
          fill="url(#cardBg)" 
          stroke="url(#borderGrad)" 
          stroke-width="1.5" 
          filter="url(#cardShadow)" />

    <!-- Card Masked Elements (Grid, HUD, Shine, Particles, Neural Network) -->
    <g mask="url(#cardMask)">
      <!-- Soft Cyber Grid -->
      <path d="M 15 40 H 205 M 15 65 H 205 M 15 90 H 205 M 15 115 H 205 M 15 140 H 205 M 15 165 H 205 M 15 190 H 205 M 40 15 V 205 M 65 15 V 205 M 90 15 V 205 M 115 15 V 205 M 140 15 V 205 M 165 15 V 205 M 190 15 V 205" 
            stroke="#ffffff" stroke-width="0.5" opacity="0.04" />

      <!-- Neural Network Lines / Cyber HUD -->
      <g stroke="#00ffd2" stroke-width="0.5" opacity="0.12" fill="none">
        <line x1="50" y1="60" x2="80" y2="40" />
        <line x1="80" y1="40" x2="140" y2="40" />
        <line x1="140" y1="40" x2="170" y2="70" />
        <line x1="170" y1="70" x2="150" y2="120" />
        <line x1="150" y1="120" x2="70" y2="130" />
        <line x1="70" y1="130" x2="50" y2="60" />
        <!-- dots -->
        <circle cx="50" cy="60" r="1.5" fill="#00ffd2"/>
        <circle cx="80" cy="40" r="1.5" fill="#a855f7"/>
        <circle cx="140" cy="40" r="1.5" fill="#00ffd2"/>
        <circle cx="170" cy="70" r="1.5" fill="#0066ff"/>
        <circle cx="150" cy="120" r="1.5" fill="#00ffd2"/>
        <circle cx="70" cy="130" r="1.5" fill="#a855f7"/>
      </g>
      
      <!-- Tech HUD Circles Behind Logo -->
      <circle cx="110" cy="95" r="54" fill="none" stroke="#00ffd2" stroke-width="0.5" opacity="0.08" stroke-dasharray="3 6"/>
      
      <!-- Rotating Outer HUD circle (Orbital Particles / Moving Neon Ring) -->
      <g transform="translate(110, 95)">
        <circle cx="0" cy="0" r="42" fill="none" stroke="#8be4ff" stroke-width="0.75" opacity="0.1" stroke-dasharray="8 4">
          <animateTransform 
            attributeName="transform" 
            type="rotate" 
            from="0" 
            to="360" 
            dur="12s" 
            repeatCount="indefinite" />
        </circle>
        <circle cx="0" cy="0" r="50" fill="none" stroke="#00ffd2" stroke-width="0.5" opacity="0.08" stroke-dasharray="24 8">
          <animateTransform 
            attributeName="transform" 
            type="rotate" 
            from="360" 
            to="0" 
            dur="9s" 
            repeatCount="indefinite" />
        </circle>
      </g>

      <!-- Glowing Particles inside Card -->
      <g opacity="0.7">
        <circle cx="45" cy="55" r="1.2" fill="#00ffd2">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="175" cy="45" r="1" fill="#a855f7">
          <animate attributeName="opacity" values="0.1;0.9;0.1" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="50" cy="140" r="1.5" fill="#8be4ff">
          <animate attributeName="opacity" values="0.3;0.8;0.3" dur="7s" repeatCount="indefinite"/>
        </circle>
        <circle cx="170" cy="145" r="1.2" fill="#00ffd2">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="5s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- Radial Glow Core behind Logo -->
      <circle cx="110" cy="95" r="36" fill="url(#logoGlow)" />

      <!-- Wobbling, Breathing & Floating Socket.IO Logo Group -->
      <g transform="translate(110, 95)">
        <g>
          <animateTransform 
            attributeName="transform" 
            type="scale" 
            values="1; 1.06; 1" 
            keyTimes="0; 0.5; 1"
            keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
            calcMode="spline"
            dur="3s" 
            repeatCount="indefinite" />
          <animateTransform 
            attributeName="transform" 
            type="rotate" 
            values="-5; 5; -5" 
            keyTimes="0; 0.5; 1"
            keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
            calcMode="spline"
            dur="7s" 
            repeatCount="indefinite" 
            additive="sum" />

          <!-- Official Socket.IO Logo Path scaled to fit -->
          <g transform="scale(2.2) translate(-12, -12)">
            <path fill="url(#logoGrad)" d="M11.9362.0137a12.1694 12.1694 0 00-2.9748.378C4.2816 1.5547.5678 5.7944.0918 10.6012c-.59 4.5488 1.7079 9.2856 5.6437 11.6345 3.8608 2.4179 9.0926 2.3199 12.8734-.223 3.3969-2.206 5.5118-6.2277 5.3858-10.2845-.058-4.0159-2.31-7.9167-5.7588-9.9796C16.354.5876 14.1431.0047 11.9362.0137zm-.063 1.696c4.9448-.007 9.7886 3.8137 10.2815 8.9245.945 5.6597-3.7528 11.4125-9.4875 11.5795-5.4538.544-10.7245-4.0798-10.8795-9.5566-.407-4.4338 2.5159-8.8346 6.6977-10.2995a9.1126 9.1126 0 013.3878-.647zm5.0908 3.2248c-2.6869 2.0849-5.2598 4.3078-7.8886 6.4567 1.2029.017 2.4118.016 3.6208.01 1.41-2.165 2.8589-4.3008 4.2678-6.4667zm-5.6647 7.6536c-1.41 2.166-2.86 4.3088-4.2699 6.4737 2.693-2.0799 5.2548-4.3198 7.9017-6.4557a255.4132 255.4132 0 00-3.6318-.018z"/>
          </g>
        </g>
      </g>

      <!-- Glass Static Reflection overlay -->
      <path d="M 15 15 L 205 15 L 205 90 L 15 130 Z" fill="url(#reflectionGrad)" opacity="0.08"/>

      <!-- Animated Glass Shine Sweep -->
      <rect x="-170" y="-50" width="55" height="350" fill="url(#shineGrad)" transform="rotate(30)">
        <animate attributeName="x" values="-240; 300" dur="7s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Card Text -->
    <!-- Glow Backing Text -->
    <text x="110" y="172" 
          font-family="'Inter', 'Poppins', 'Segoe UI', sans-serif" 
          font-size="13" 
          font-weight="700" 
          fill="#00ffd2" 
          text-anchor="middle" 
          letter-spacing="1"
          filter="url(#textGlow)"
          opacity="0.8">Socket.IO</text>
    <!-- Crisp Foreground Text -->
    <text x="110" y="172" 
          font-family="'Inter', 'Poppins', 'Segoe UI', sans-serif" 
          font-size="13" 
          font-weight="700" 
          fill="#ffffff" 
          text-anchor="middle" 
          letter-spacing="1">Socket.IO</text>
  </g>
</svg>
