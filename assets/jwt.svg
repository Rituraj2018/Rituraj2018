<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="100%" height="100%">
  <!-- Defs for premium effects -->
  <defs>
    <!-- Background blur filter for glowing blobs -->
    <filter id="bgBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24" />
    </filter>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.65"/>
    </filter>

    <!-- Soft neon glow for text -->
    <filter id="textGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Canvas Radial Background -->
    <radialGradient id="canvasBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#140610" />
      <stop offset="100%" stop-color="#040103" />
    </radialGradient>

    <!-- Glassmorphic Card Background -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c0716" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#08020a" stop-opacity="0.95" />
    </linearGradient>

    <!-- Rotating Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%" gradientTransform="rotate(0 0.5 0.5)">
      <animateTransform 
        attributeName="gradientTransform" 
        type="rotate" 
        from="0 0.5 0.5" 
        to="360 0.5 0.5" 
        dur="5s" 
        repeatCount="indefinite"/>
      <stop offset="0%" stop-color="#fb0056"/>
      <stop offset="35%" stop-color="#d63aff"/>
      <stop offset="70%" stop-color="#ffb300"/>
      <stop offset="100%" stop-color="#fb0056"/>
    </linearGradient>

    <!-- Shiny diagonal line gradient -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Glossy reflection static gradient -->
    <linearGradient id="reflectionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Logo Gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb0056" />
      <stop offset="50%" stop-color="#d63aff" />
      <stop offset="100%" stop-color="#ffb300" />
    </linearGradient>

    <!-- Logo Glow -->
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb0056" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fb0056" stop-opacity="0"/>
    </radialGradient>

    <!-- Mask for card inner boundaries -->
    <mask id="cardMask">
      <rect x="15" y="15" width="190" height="190" rx="22" fill="#ffffff" />
    </mask>
  </defs>

  <!-- 1. Canvas Background -->
  <rect width="220" height="220" rx="24" fill="url(#canvasBg)" />

  <!-- 2. Ambient Background Glow Blobs -->
  <circle cx="50" cy="50" r="70" fill="#fb0056" opacity="0.12" filter="url(#bgBlur)">
    <animate attributeName="opacity" values="0.08;0.18;0.08" dur="8.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="170" r="70" fill="#d63aff" opacity="0.12" filter="url(#bgBlur)">
    <animate attributeName="opacity" values="0.18;0.08;0.18" dur="8.5s" repeatCount="indefinite"/>
  </circle>

  <!-- 3. Floating Container for the Entire Card -->
  <g>
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      values="0 0; 0 -5; 0 0" 
      keyTimes="0; 0.5; 1"
      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
      calcMode="spline"
      dur="6.8s" 
      repeatCount="indefinite" />

    <!-- Card Base (Shadow + Glassmorphic background + Glowing Animated Border) -->
    <rect x="15" y="15" width="190" height="190" rx="22" 
          fill="url(#cardBg)" 
          stroke="url(#borderGrad)" 
          stroke-width="1.5" 
          filter="url(#cardShadow)" />

    <!-- Card Masked Elements (Grid, HUD, Shine, Particles, Neural Network) -->
    <g mask="url(#cardMask)">
      <!-- Soft Cyber Grid -->
      <path d="M 15 40 H 205 M 15 65 H 205 M 15 90 H 205 M 15 115 H 205 M 15 140 H 205 M 15 165 H 205 M 15 190 H 205 M 40 15 V 205 M 65 15 V 205 M 90 15 V 205 M 115 15 V 205 M 140 15 V 205 M 165 15 V 205 M 190 15 V 205" 
            stroke="#ffffff" stroke-width="0.5" opacity="0.04" />

      <!-- Neural Network Lines / Cyber HUD -->
      <g stroke="#fb0056" stroke-width="0.5" opacity="0.12" fill="none">
        <line x1="50" y1="60" x2="80" y2="40" />
        <line x1="80" y1="40" x2="140" y2="40" />
        <line x1="140" y1="40" x2="170" y2="70" />
        <line x1="170" y1="70" x2="150" y2="120" />
        <line x1="150" y1="120" x2="70" y2="130" />
        <line x1="70" y1="130" x2="50" y2="60" />
        <!-- dots -->
        <circle cx="50" cy="60" r="1.5" fill="#fb0056"/>
        <circle cx="80" cy="40" r="1.5" fill="#d63aff"/>
        <circle cx="140" cy="40" r="1.5" fill="#fb0056"/>
        <circle cx="170" cy="70" r="1.5" fill="#ffb300"/>
        <circle cx="150" cy="120" r="1.5" fill="#fb0056"/>
        <circle cx="70" cy="130" r="1.5" fill="#d63aff"/>
      </g>
      
      <!-- Tech HUD Circles Behind Logo -->
      <circle cx="110" cy="95" r="54" fill="none" stroke="#fb0056" stroke-width="0.5" opacity="0.08" stroke-dasharray="3 6"/>
      
      <!-- Rotating Outer HUD circle (Orbital Particles / Moving Neon Ring) -->
      <g transform="translate(110, 95)">
        <circle cx="0" cy="0" r="42" fill="none" stroke="#ffb300" stroke-width="0.75" opacity="0.1" stroke-dasharray="8 4">
          <animateTransform 
            attributeName="transform" 
            type="rotate" 
            from="0" 
            to="360" 
            dur="15s" 
            repeatCount="indefinite" />
        </circle>
        <circle cx="0" cy="0" r="50" fill="none" stroke="#fb0056" stroke-width="0.5" opacity="0.08" stroke-dasharray="24 8">
          <animateTransform 
            attributeName="transform" 
            type="rotate" 
            from="360" 
            to="0" 
            dur="9s" 
            repeatCount="indefinite" />
        </circle>
      </g>

      <!-- Glowing Particles inside Card -->
      <g opacity="0.7">
        <circle cx="45" cy="55" r="1.2" fill="#fb0056">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="175" cy="45" r="1" fill="#d63aff">
          <animate attributeName="opacity" values="0.1;0.9;0.1" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="50" cy="140" r="1.5" fill="#ffb300">
          <animate attributeName="opacity" values="0.3;0.8;0.3" dur="7s" repeatCount="indefinite"/>
        </circle>
        <circle cx="170" cy="145" r="1.2" fill="#fb0056">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="5s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- Radial Glow Core behind Logo -->
      <circle cx="110" cy="95" r="36" fill="url(#logoGlow)" />

      <!-- Wobbling, Breathing & Rotating JWT Logo Group -->
      <g transform="translate(110, 95)">
        <g>
          <animateTransform 
            attributeName="transform" 
            type="scale" 
            values="1; 1.06; 1" 
            keyTimes="0; 0.5; 1"
            keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
            calcMode="spline"
            dur="4.2s" 
            repeatCount="indefinite" />
          <animateTransform 
            attributeName="transform" 
            type="rotate" 
            from="0" 
            to="360" 
            dur="15s" 
            repeatCount="indefinite" 
            additive="sum" />

          <!-- Official JWT Logo Path scaled to fit -->
          <g transform="scale(2.2) translate(-12, -12)">
            <path fill="url(#logoGrad)" d="M10.2 0v6.456L12 8.928l1.8-2.472V0zm3.6 6.456v3.072l2.904-.96L20.52 3.36l-2.928-2.136zm2.904 2.112l-1.8 2.496 2.928.936 6.144-1.992-1.128-3.432zM17.832 12l-2.928.936 1.8 2.496 6.144 1.992 1.128-3.432zm-1.128 3.432l-2.904-.96v3.072l3.792 5.232 2.928-2.136zM13.8 17.544L12 15.072l-1.8 2.472V24h3.6zm-3.6 0v-3.072l-2.904.96L3.48 20.64l2.928 2.136zm-2.904-2.112l1.8-2.496L6.168 12 .024 13.992l1.128 3.432zM6.168 12l2.928-.936-1.8-2.496-6.144-1.992-1.128 3.432zm1.128-3.432l2.904.96V6.456L6.408 1.224 3.48 3.36Z"/>
          </g>
        </g>
      </g>

      <!-- Glass Static Reflection overlay -->
      <path d="M 15 15 L 205 15 L 205 90 L 15 130 Z" fill="url(#reflectionGrad)" opacity="0.08"/>

      <!-- Animated Glass Shine Sweep -->
      <rect x="-170" y="-50" width="55" height="350" fill="url(#shineGrad)" transform="rotate(30)">
        <animate attributeName="x" values="-240; 300" dur="5.2s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Card Text -->
    <!-- Glow Backing Text -->
    <text x="110" y="172" 
          font-family="'Inter', 'Poppins', 'Segoe UI', sans-serif" 
          font-size="14" 
          font-weight="700" 
          fill="#d63aff" 
          text-anchor="middle" 
          letter-spacing="1px"
          filter="url(#textGlow)"
          opacity="0.8">JWT</text>
    <!-- Crisp Foreground Text -->
    <text x="110" y="172" 
          font-family="'Inter', 'Poppins', 'Segoe UI', sans-serif" 
          font-size="14" 
          font-weight="700" 
          fill="#ffffff" 
          text-anchor="middle" 
          letter-spacing="1px">JWT</text>
  </g>
</svg>
